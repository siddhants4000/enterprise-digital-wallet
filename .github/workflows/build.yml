name: Enterprise Wallet CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build, Dockerize and Validate Helm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Build Spring Boot project
        run: ./mvnw clean package -DskipTests

      - name: Build Docker image
        run: docker build -t enterprise-wallet-app:ci .

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint Helm chart
        run: helm lint helm/wallet-platform

      - name: Render Helm templates
        run: helm template wallet-platform helm/wallet-platform